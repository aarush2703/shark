
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

    ],

    options:[
      {text:"Netz meiden — Sardinenschwarm jagen",bio:"Falle umgehen, satt werden, Funktion im Ökosystem erhalten.",q:1},

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function stopRaf(){if(raf){cancelAnimationFrame(raf);raf=null;}}

function render(){
  stopRaf();
  if(screen==='intro') renderIntro();
  else if(screen==='bio') renderBio();
  else if(screen==='game') renderGame();
  else renderResult();
}

function renderIntro(){
  root.innerHTML=`
<div style="position:relative;overflow:hidden;height:340px;background:#05060e">
  <canvas id="ic" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:linear-gradient(to bottom,transparent 30%,rgba(5,6,14,0.7))">
    <div class="tag tc" style="margin-bottom:1rem">Meeresbiologie · DnD-Stil · 4 Runden</div>
    <div class="serif" style="font-size:2.6rem;font-weight:700;color:#ededf0;line-height:1.1;margin-bottom:.3rem">Weißer Hai</div>
    <div class="serif" style="font-style:italic;font-size:1.1rem;color:var(--cyan);margin-bottom:1.5rem">Apex-Predator im Atlantik</div>
    <p style="font-size:.85rem;color:var(--text2);max-width:380px;line-height:1.7;margin-bottom:1.75rem">Du bist ein junger Weißer Hai. Lerne biotische und abiotische Faktoren durch Entscheidungen — 4 Runden, jede mit Konsequenz.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button onclick="screen='bio';render()" style="background:var(--cyan);color:#05060e;border:none;border-radius:8px;padding:.7rem 1.75rem;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer">Biologie-Briefing lesen</button>
      <button onclick="screen='game';render()" style="background:transparent;color:var(--text2);border:1px solid var(--bd2);border-radius:8px;padding:.7rem 1.5rem;font-family:inherit;font-size:.85rem;cursor:pointer">Direkt starten →</button>
    </div>
  </div>
</div>`;
  initIntroCanvas();

function initIntroCanvas(){
  const c=document.getElementById('ic');
  if(!c)return;
  const cx=c.getContext('2d');
  let W,H,t=0;
  const bubbles=Array.from({length:35},()=>({x:Math.random()*800,y:Math.random()*340+340,r:Math.random()*3+1,spd:.3+Math.random()*.5,wo:Math.random()*Math.PI*2,wa:Math.random()*8+3,op:.15+Math.random()*.25}));
  const pts=Array.from({length:20},()=>({x:Math.random()*800,y:Math.random()*340,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.2,r:.4+Math.random()*.9,p:Math.random()*6}));
  const sharks2=[
    {x:-60,y:120,sc:58,dir:1,spd:.5,al:.93,wt:0,wf:.016,wa:9,wy:0},
    {x:700,y:230,sc:28,dir:-1,spd:.32,al:.4,wt:2,wf:.018,wa:7,wy:0},
    {x:350,y:260,sc:16,dir:1,spd:.2,al:.22,wt:4,wf:.02,wa:5,wy:0},
  ];
  function rsz(){const r=c.getBoundingClientRect();const dpr=Math.min(devicePixelRatio,2);c.width=r.width*dpr;c.height=r.height*dpr;cx.scale(dpr,dpr);W=r.width;H=r.height;}
  rsz();
  function drawShark(cx,s){
    cx.save();cx.translate(s.x,s.y+s.wy);if(s.dir<0)cx.scale(-1,1);cx.globalAlpha=s.al;
    const sc=s.sc,tp=Math.sin(s.wt*2.1);
    cx.beginPath();cx.moveTo(-sc*1.05,-sc*.2+tp*sc*.16);cx.quadraticCurveTo(-sc*.5,-sc*.35,0,0);cx.quadraticCurveTo(-sc*.5,sc*.35,-sc*1.05,sc*.2+tp*sc*.16);cx.closePath();cx.fillStyle='rgba(92,224,192,0.06)';cx.strokeStyle='rgba(92,224,192,0.15)';cx.lineWidth=.5;cx.fill();cx.stroke();
    cx.beginPath();cx.moveTo(sc*1.05,0);cx.quadraticCurveTo(sc*.55,-sc*.08,0,-sc*.17);cx.quadraticCurveTo(-sc*.45,-sc*.22,-sc*1.05,-sc*.2+tp*sc*.16);cx.quadraticCurveTo(-sc*.65,0,-sc*1.05,sc*.2+tp*sc*.16);cx.quadraticCurveTo(-sc*.45,sc*.22,0,sc*.17);cx.quadraticCurveTo(sc*.55,sc*.08,sc*1.05,0);cx.closePath();cx.fillStyle='rgba(10,14,28,0.9)';cx.fill();cx.strokeStyle='rgba(92,224,192,0.3)';cx.lineWidth=.9;cx.stroke();
    cx.beginPath();cx.moveTo(sc*.08,-sc*.17);cx.lineTo(sc*.38,-sc*.6);cx.lineTo(sc*.58,-sc*.19);cx.closePath();cx.fillStyle='rgba(8,12,24,0.9)';cx.fill();cx.strokeStyle='rgba(92,224,192,0.24)';cx.lineWidth=.7;cx.stroke();
    cx.beginPath();cx.moveTo(-sc*.18,sc*.17);cx.lineTo(-sc*.05,sc*.46);cx.lineTo(sc*.14,sc*.19);cx.closePath();cx.fillStyle='rgba(8,12,24,0.9)';cx.fill();cx.strokeStyle='rgba(92,224,192,0.16)';cx.lineWidth=.6;cx.stroke();
    cx.beginPath();cx.moveTo(sc*.6,-sc*.04);cx.lineTo(sc*.88,sc*.27);cx.lineTo(sc*.52,sc*.1);cx.closePath();cx.fillStyle='rgba(8,12,24,0.9)';cx.fill();cx.strokeStyle='rgba(92,224,192,0.13)';cx.lineWidth=.6;cx.stroke();
    cx.beginPath();cx.arc(sc*.8,-sc*.055,sc*.055,0,Math.PI*2);cx.fillStyle='rgba(92,224,192,0.6)';cx.fill();
    cx.beginPath();cx.arc(sc*.8,-sc*.055,sc*.022,0,Math.PI*2);cx.fillStyle='rgba(5,8,20,1)';cx.fill();
    cx.restore();
  }
  function drawBioLabels(cx,s){
    if(s.sc<50)return;
    cx.save();cx.translate(s.x,s.y+s.wy);if(s.dir<0)cx.scale(-1,1);cx.globalAlpha=.7;
    const lbls=[
      {tx:62,ty:-68,lx:s.sc*.95,ly:-s.sc*.05,txt:'Lorenzini-Ampullen',sub:'Elektrosinn'},
      {tx:10,ty:62,lx:-s.sc*.1,ly:s.sc*.18,txt:'Seitenlinie',sub:'Druckwellen'},
      {tx:38,ty:-82,lx:s.sc*.38,ly:-s.sc*.58,txt:'Dorsalflosse',sub:'Stabilität'},
    ];
    lbls.forEach(lb=>{
      cx.strokeStyle='rgba(92,224,192,0.2)';cx.lineWidth=.5;cx.setLineDash([3,4]);
      cx.beginPath();cx.moveTo(lb.lx,lb.ly);cx.lineTo(lb.tx,lb.ty);cx.stroke();cx.setLineDash([]);
      cx.font='600 10px Space Grotesk,sans-serif';
      const tw=cx.measureText(lb.txt).width+14;
      cx.fillStyle='rgba(5,8,18,0.8)';rr(cx,lb.tx-tw/2,lb.ty-2,tw,28,4);cx.fill();
      cx.strokeStyle='rgba(92,224,192,0.18)';cx.lineWidth=.5;cx.stroke();
      cx.fillStyle='rgba(92,224,192,0.85)';cx.textAlign='center';cx.fillText(lb.txt,lb.tx,lb.ty+8);
      cx.fillStyle='rgba(92,224,192,0.38)';cx.font='400 8.5px Space Grotesk,sans-serif';cx.fillText(lb.sub,lb.tx,lb.ty+20);
    });
    cx.restore();
  }
  function loop(){
    cx.clearRect(0,0,W,H);
    for(let d=0;d<5;d++){const y=H*.1+d*H*.2;cx.strokeStyle=`rgba(92,224,192,${.02+d*.012})`;cx.lineWidth=.5;cx.beginPath();for(let x=0;x<=W;x+=4){const w=Math.sin((x/55)+t*.35+d*.9)*2.5+Math.sin((x/22)+t*.6+d)*1.2;x===0?cx.moveTo(x,y+w):cx.lineTo(x,y+w);}cx.stroke();}
    bubbles.forEach(b=>{b.y-=b.spd;b.x+=Math.sin(b.wo+t*.8)*b.wa*.012;if(b.y<-10)b.y=H+10;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.strokeStyle=`rgba(92,224,192,${b.op})`;cx.lineWidth=.8;cx.stroke();cx.fillStyle=`rgba(92,224,192,${b.op*.3})`;cx.fill();});
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.016;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=`rgba(92,224,192,${.2+Math.sin(p.p)*.1})`;cx.fill();});
    pts.forEach((p,i)=>{for(let j=i+1;j<pts.length;j++){const q=pts[j],d=Math.hypot(p.x-q.x,p.y-q.y);if(d<85){cx.strokeStyle=`rgba(92,224,192,${(1-d/85)*.055})`;cx.lineWidth=.4;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(q.x,q.y);cx.stroke();}}});
    sharks2.forEach(s=>{s.wt+=s.wf;s.wy=Math.sin(s.wt)*s.wa;s.x+=s.spd*s.dir;if(s.dir>0&&s.x>W+160)s.x=-160;if(s.dir<0&&s.x<-160)s.x=W+160;drawShark(cx,s);});
    drawBioLabels(cx,sharks2[0]);
    t+=.011;raf=requestAnimationFrame(loop);
  }
  loop();
}

      <div style="background:var(--bg4);border-radius:6px;padding:.55rem .8rem;border-left:2px solid var(--amber);margin-bottom:5px">
        <div style="font-size:.68rem;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px">Apex-Prädation &amp; Selektion</div>

  </div>
  <div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:.9rem 1.1rem;margin-bottom:1rem">

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">

function initBioCanvas(){
  const c=document.getElementById('bc');if(!c)return;
  const cx=c.getContext('2d');let W,H,t=0;
  const bubbles=Array.from({length:22},()=>({x:Math.random()*800,y:Math.random()*220+220,r:.8+Math.random()*2.2,spd:.25+Math.random()*.4,wo:Math.random()*6.28,op:.12+Math.random()*.2}));
  const s={x:-50,y:95,dir:1,spd:.45,sc:46,wt:0,wf:.017,wa:8,wy:0};
  const s2={x:700,y:160,dir:-1,spd:.28,sc:22,wt:3,wf:.019,wa:6,wy:0};
  function rsz(){const r=c.getBoundingClientRect();const dpr=Math.min(devicePixelRatio,2);c.width=r.width*dpr;c.height=r.height*dpr;cx.scale(dpr,dpr);W=r.width;H=r.height;}
  rsz();
  function dSh(cx,sh,lbl){
    cx.save();cx.translate(sh.x,sh.y+sh.wy);if(sh.dir<0)cx.scale(-1,1);cx.globalAlpha=sh.dir>0?.88:.38;
    const sc=sh.sc,tp=Math.sin(sh.wt*2.1);
    cx.beginPath();cx.moveTo(-sc*1.05,-sc*.2+tp*sc*.16);cx.quadraticCurveTo(-sc*.5,-sc*.35,0,0);cx.quadraticCurveTo(-sc*.5,sc*.35,-sc*1.05,sc*.2+tp*sc*.16);cx.closePath();cx.fillStyle='rgba(92,224,192,0.06)';cx.strokeStyle='rgba(92,224,192,0.15)';cx.lineWidth=.5;cx.fill();cx.stroke();
    cx.beginPath();cx.moveTo(sc*1.05,0);cx.quadraticCurveTo(sc*.55,-sc*.08,0,-sc*.17);cx.quadraticCurveTo(-sc*.45,-sc*.22,-sc*1.05,-sc*.2+tp*sc*.16);cx.quadraticCurveTo(-sc*.65,0,-sc*1.05,sc*.2+tp*sc*.16);cx.quadraticCurveTo(-sc*.45,sc*.22,0,sc*.17);cx.quadraticCurveTo(sc*.55,sc*.08,sc*1.05,0);cx.closePath();cx.fillStyle='rgba(10,14,28,0.9)';cx.fill();cx.strokeStyle='rgba(92,224,192,0.3)';cx.lineWidth=.85;cx.stroke();
    cx.beginPath();cx.moveTo(sc*.08,-sc*.17);cx.lineTo(sc*.38,-sc*.6);cx.lineTo(sc*.58,-sc*.19);cx.closePath();cx.fillStyle='rgba(8,12,24,0.9)';cx.fill();cx.strokeStyle='rgba(92,224,192,0.22)';cx.lineWidth=.7;cx.stroke();
    cx.beginPath();cx.arc(sc*.8,-sc*.055,sc*.055,0,Math.PI*2);cx.fillStyle='rgba(92,224,192,0.55)';cx.fill();
    cx.beginPath();cx.arc(sc*.8,-sc*.055,sc*.022,0,Math.PI*2);cx.fillStyle='rgba(5,8,20,1)';cx.fill();
    if(lbl){
      cx.globalAlpha=.65;
      const L=[{tx:64,ty:-58,lx:sc*.95,ly:-sc*.05,t:'Lorenzini',s:'Elektrosinn'},{tx:4,ty:54,lx:0,ly:sc*.17,t:'Seitenlinie',s:'Druckwellen'},{tx:40,ty:-72,lx:sc*.38,ly:-sc*.58,t:'Dorsalflosse',s:'Stabilität'}];
      L.forEach(lb=>{
        cx.strokeStyle='rgba(92,224,192,0.18)';cx.lineWidth=.5;cx.setLineDash([3,4]);
        cx.beginPath();cx.moveTo(lb.lx,lb.ly);cx.lineTo(lb.tx,lb.ty);cx.stroke();cx.setLineDash([]);
        cx.font='600 9.5px Space Grotesk,sans-serif';const tw=cx.measureText(lb.t).width+12;
        cx.fillStyle='rgba(4,6,16,0.82)';rr(cx,lb.tx-tw/2,lb.ty-1,tw,26,4);cx.fill();
        cx.strokeStyle='rgba(92,224,192,0.16)';cx.lineWidth=.5;cx.stroke();
        cx.fillStyle='rgba(92,224,192,0.82)';cx.textAlign='center';cx.fillText(lb.t,lb.tx,lb.ty+7.5);
        cx.fillStyle='rgba(92,224,192,0.35)';cx.font='400 8px Space Grotesk,sans-serif';cx.fillText(lb.s,lb.tx,lb.ty+18);
      });
    }
    cx.restore();
  }
  function loop(){
    cx.clearRect(0,0,W,H);
    for(let d=0;d<4;d++){const y=H*.1+d*H*.25;cx.strokeStyle=`rgba(92,224,192,${.018+d*.01})`;cx.lineWidth=.5;cx.beginPath();for(let x=0;x<=W;x+=4){const w=Math.sin((x/50)+t*.35+d*.9)*2+Math.sin((x/20)+t*.6+d)*1;x===0?cx.moveTo(x,y+w):cx.lineTo(x,y+w);}cx.stroke();}

    s.wt+=s.wf;s.wy=Math.sin(s.wt)*s.wa;s.x+=s.spd;if(s.x>W+130)s.x=-130;dSh(cx,s,true);
    s2.wt+=s2.wf;s2.wy=Math.sin(s2.wt)*s2.wa;s2.x-=s2.spd;if(s2.x<-130)s2.x=W+130;dSh(cx,s2,false);

  const pct=Math.max(0,score);
  const fc=pct>=70?'var(--green)':pct>=40?'var(--amber)':'var(--red)';
  const dots=Array.from({length:4},(_,i)=>{const a=i<round?'var(--cyan)':i===round?'var(--amber)':'var(--bg4)';const b=i<round?'var(--cyan)':i===round?'var(--amber)':'var(--bd)';return `<div style="width:7px;height:7px;border-radius:50%;background:${a};border:1px solid ${b};transition:all .3s"></div>`;}).join('');
  root.innerHTML=`
<div class="fade">
  <div style="position:relative;overflow:hidden;height:130px;background:#05060e;border-bottom:1px solid var(--bd)">
    <canvas id="sc" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:.875rem 1.1rem;background:linear-gradient(to top,rgba(5,6,14,0.85) 0%,transparent 50%)">
      <div class="tag ${round===0?'ta':round===1?'tc':round===2?'tp':round===3?'tr':'tc'}" style="margin-bottom:.3rem;width:fit-content;font-size:9.5px">Runde ${round+1} von 4</div>
      <div class="serif" style="font-size:1.05rem;font-weight:700;color:var(--text)">${r.title}</div>
    </div>
    <div style="position:absolute;top:.75rem;right:.875rem;display:flex;align-items:center;gap:8px">
      <div style="display:flex;gap:4px">${dots}</div>
      <div style="width:70px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${fc};border-radius:2px;transition:width .5s ease"></div></div>
      <span style="font-size:.78rem;font-weight:600;color:${fc}">${pct}%</span>
    </div>
  </div>
  <div style="padding:1rem 1.1rem">
    <p style="font-size:.83rem;color:var(--text2);line-height:1.7;margin-bottom:.875rem">${r.situation}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:.875rem">
      <div style="background:var(--bg3);border:1px solid rgba(92,224,192,0.14);border-radius:8px;padding:.65rem .875rem">
        <div style="font-size:.62rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px">Abiotisch</div>
        <div style="font-size:.75rem;font-weight:600;color:var(--text);margin-bottom:2px">${r.abiotic.label}</div>
        <div style="font-size:.73rem;color:var(--text3);line-height:1.5">${r.abiotic.text}</div>
      </div>
      <div style="background:var(--bg3);border:1px solid rgba(251,191,36,0.14);border-radius:8px;padding:.65rem .875rem">
        <div style="font-size:.62rem;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px">Biotisch</div>
        <div style="font-size:.75rem;font-weight:600;color:var(--text);margin-bottom:2px">${r.biotic.label}</div>
        <div style="font-size:.73rem;color:var(--text3);line-height:1.5">${r.biotic.text}</div>
      </div>
    </div>
    <div style="font-size:.62rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">Deine Entscheidung</div>
    <div id="opts"></div>
    <div id="cons"></div>
  </div>
</div>`;
  setTimeout(()=>drawSceneCanvas('sc',r.scene),30);
  r.options.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.id='opt'+i;
    btn.style.cssText='width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:.75rem 1rem;text-align:left;cursor:pointer;margin-bottom:6px;font-family:inherit;transition:all .2s;display:block';
    btn.innerHTML=`<div style="font-size:.62rem;font-weight:700;color:var(--cyan);letter-spacing:.07em;margin-bottom:2px">OPTION ${String.fromCharCode(65+i)}</div><div style="font-size:.83rem;color:var(--text);margin-bottom:2px">${o.text}</div><div style="font-size:.73rem;color:var(--text3);font-style:italic">${o.bio}</div>`;
    btn.onmouseover=()=>{if(!answered){btn.style.borderColor='var(--bd2)';btn.style.background='var(--bg4)';}};
    btn.onmouseout=()=>{if(!answered){btn.style.borderColor='var(--bd)';btn.style.background='var(--bg3)';}};
    btn.onclick=()=>choose(i);
    document.getElementById('opts').appendChild(btn);
  });
}

function choose(idx){
  if(answered)return;answered=true;
  const r=ROUNDS[round];const o=r.options[idx];
  const delta=o.q===1?10:o.q===-1?-30:-10;
  score=Math.max(0,Math.min(130,score+delta));
  history.push({round:round+1,choice:o.text,delta,score});
  for(let i=0;i<r.options.length;i++){
    const b=document.getElementById('opt'+i);
    b.disabled=true;b.style.cursor='default';b.onmouseover=null;b.onmouseout=null;
    if(i===idx){
      const q=o.q;
      b.style.borderColor=q===1?'rgba(74,222,128,.4)':q===-1?'rgba(255,107,107,.35)':'rgba(251,191,36,.35)';
      b.style.background=q===1?'rgba(74,222,128,.06)':q===-1?'rgba(255,107,107,.06)':'rgba(251,191,36,.06)';
    }
  }
  const c=r.cons[idx];
  const dc=o.q===1?'var(--green)':o.q===-1?'var(--red)':'var(--amber)';
  const ds=delta>0?'+':'';
  const lbl=o.q===1?'Richtige Wahl':o.q===-1?'Falsche Wahl':'Suboptimal';
  const tc=o.q===1?'tg':o.q===-1?'tr':'ta';
  document.getElementById('cons').innerHTML=`
<div style="background:var(--bg3);border:1px solid ${o.q===1?'rgba(74,222,128,.2)':o.q===-1?'rgba(255,107,107,.18)':'rgba(251,191,36,.18)'};border-radius:8px;padding:.875rem 1rem;margin-top:2px;animation:fu .3s ease">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:6px">
    <span class="tag ${tc}">${lbl}</span>
    <span style="font-size:.8rem;font-weight:700;color:${dc}">${ds}${delta}% → ${Math.max(0,score)}%</span>
  </div>
  <p style="font-size:.82rem;color:var(--text2);line-height:1.65">${c.txt}</p>
</div>
<button onclick="goNext()" style="width:100%;margin-top:.6rem;background:var(--cyan);color:#05060e;border:none;border-radius:8px;padding:.65rem;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;text-align:center">${round<3?'Nächste Runde →':'Ergebnis sehen →'}</button>`;
}

function goNext(){round++;answered=false;if(round>=4){screen='result';render();}else renderGame();}

function renderResult(){
  const win=score>=70;
  const fc=score>=70?'var(--green)':score>=40?'var(--amber)':'var(--red)';
  const rows=history.map(h=>{const dc=h.delta>0?'var(--green)':h.delta<0?'var(--red)':'var(--amber)';const ds=h.delta>0?'+':'';return`<tr><td style="padding:.5rem .75rem;color:var(--text3);font-size:.75rem">Runde ${h.round}</td><td style="padding:.5rem .75rem;color:var(--text2);font-size:.78rem">${h.choice}</td><td style="padding:.5rem .75rem;text-align:right;font-weight:600;font-size:.8rem;color:${dc}">${ds}${h.delta}%</td><td style="padding:.5rem .75rem;text-align:right;font-size:.8rem;color:var(--text)">${h.score}%</td></tr>`;}).join('');
  root.innerHTML=`
<div class="fade" style="padding:1.5rem 1.25rem;text-align:center">
  <div style="width:60px;height:60px;border-radius:50%;background:${win?'rgba(74,222,128,.1)':'rgba(255,107,107,.09)'};border:1px solid ${win?'rgba(74,222,128,.25)':'rgba(255,107,107,.22)'};display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:.9rem;color:${fc};font-weight:700">${win?'◈':'✕'}</div>
  <div class="serif" style="font-size:1.7rem;font-weight:700;color:${fc};margin-bottom:.4rem">${win?'Sieg!':'Niederlage.'}</div>
  <p style="font-size:.82rem;color:var(--text2);max-width:360px;margin:0 auto .75rem;line-height:1.65">${win?'Du hast die Gesetze des Ozeans verstanden. Als Apex-Predator hältst du das Ökosystem in Balance.':'Ein Weißer Hai, der biotische und abiotische Faktoren ignoriert, überlebt nicht. Das Meer ist gnadenlos.'}</p>
  <div style="font-size:2.4rem;font-weight:700;font-family:'Playfair Display',serif;color:${fc}">${Math.max(0,score)}%</div>
  <div style="font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1.25rem">Endpunktzahl</div>
  <div class="card" style="text-align:left;margin-bottom:1.25rem;overflow:hidden">
    <div style="padding:.6rem .875rem;border-bottom:1px solid var(--bd)"><span style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">Rundenauswertung</span></div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:1px solid var(--bd)"><th style="padding:.45rem .75rem;text-align:left;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600">Runde</th><th style="padding:.45rem .75rem;text-align:left;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600">Entscheidung</th><th style="padding:.45rem .75rem;text-align:right;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600">Δ</th><th style="padding:.45rem .75rem;text-align:right;font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600">Score</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button onclick="round=0;score=100;history=[];answered=false;screen='game';render()" style="background:var(--cyan);color:#05060e;border:none;border-radius:8px;padding:.65rem 1.5rem;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer">Nochmal spielen</button>
    <button onclick="screen='bio';render()" style="background:transparent;color:var(--text2);border:1px solid var(--bd2);border-radius:8px;padding:.65rem 1.25rem;font-family:inherit;font-size:.8rem;cursor:pointer">Briefing nochmal lesen</button>
  </div>
</div>`;
}

render();
</script>
